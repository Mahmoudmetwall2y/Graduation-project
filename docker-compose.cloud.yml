services:
  nginx:
    ports:
      - "${NGINX_N8N_ALT_HTTP_BIND_ADDRESS:-127.0.0.1}:${NGINX_N8N_ALT_HTTP_PORT:-8081}:8081"
      - "${NGINX_N8N_ALT_HTTPS_BIND_ADDRESS:-127.0.0.1}:${NGINX_N8N_ALT_HTTPS_PORT:-8443}:8443"
    environment:
      - NGINX_N8N_SERVER_NAME=${NGINX_N8N_SERVER_NAME:-n8n.localhost}
      - NGINX_N8N_ALT_SERVER_NAME=${NGINX_N8N_ALT_SERVER_NAME:-localhost}
      - NGINX_N8N_SSL_CERT_PATH=${NGINX_N8N_SSL_CERT_PATH:-/etc/nginx/certs/fullchain.pem}
      - NGINX_N8N_SSL_KEY_PATH=${NGINX_N8N_SSL_KEY_PATH:-/etc/nginx/certs/privkey.pem}
    depends_on:
      n8n:
        condition: service_started
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/default.cloud.conf.template:/etc/nginx/templates/default.conf.template:ro

  n8n:
    image: docker.n8n.io/n8nio/n8n:stable
    container_name: asculticor-n8n
    ports:
      - "${N8N_BIND_ADDRESS:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:?N8N_USER is required}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?N8N_PASSWORD is required}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      - N8N_HOST=${N8N_DOMAIN:-localhost}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_PORT=5678
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-1}
      - N8N_PUSH_BACKEND=${N8N_PUSH_BACKEND:-sse}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Africa/Cairo}
      - TZ=${GENERIC_TIMEZONE:-Africa/Cairo}
      - ASCULTICOR_APP_URL=http://frontend:3000
      - ASCULTICOR_PUBLIC_APP_URL=${DEVICE_BOOTSTRAP_PUBLIC_BASE_URL:-}
      - ASCULTICOR_INFERENCE_URL=http://inference:8000
      - ASCULTICOR_INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required}
      - ASCULTICOR_INFERENCE_TOKEN=${INFERENCE_INTERNAL_TOKEN:?INFERENCE_INTERNAL_TOKEN is required}
      - ASCULTICOR_ALERT_EMAIL_TO=${ASCULTICOR_ALERT_EMAIL_TO:-}
      - ASCULTICOR_ALERT_EMAIL_FROM=${ASCULTICOR_ALERT_EMAIL_FROM:-AscultiCor <alerts@localhost>}
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:?MQTT_USERNAME is required}
      - MQTT_PASSWORD=${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_BASE_URL=${CLAUDE_BASE_URL:-https://agentrouter.org}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250514}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - asculticor-network
    depends_on:
      frontend:
        condition: service_started
      inference:
        condition: service_started
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

volumes:
  n8n_data:
