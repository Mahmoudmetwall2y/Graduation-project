worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # ── Upstream services ─────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream mqtt_ws {
        server mosquitto:9001;
    }

    upstream inference_api {
        server inference:8000;
    }

    # ── HTTPS Server Block ────────────────────────────────────────────
    # For local development, use self-signed certs.
    # In production, replace with Let's Encrypt or ACM certs.
    server {
        listen 80;
        listen 443 ssl;
        server_name localhost;

        # Self-signed placeholder — generate via:
        #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #     -keyout /etc/nginx/certs/selfsigned.key \
        #     -out /etc/nginx/certs/selfsigned.crt
        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # ── Frontend (Next.js) ────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── MQTT over WebSockets ──────────────────────────────────────
        location /mqtt {
            proxy_pass http://mqtt_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Inference API ─────────────────────────────────────────────
        location /api/inference/ {
            proxy_pass http://inference_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
