services:
  # MQTT Broker (Mosquitto)
  mosquitto:
    build:
      context: ./mosquitto
      dockerfile: Dockerfile
    container_name: asculticor-mosquitto
    ports:
      - "${MQTT_BIND_ADDRESS:-127.0.0.1}:${MQTT_TCP_PORT:-1883}:1883"
      - "${MQTT_WS_BIND_ADDRESS:-127.0.0.1}:${MQTT_WS_PORT:-9001}:9001"
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      - MQTT_SYNC_INTERVAL_SEC=${MQTT_SYNC_INTERVAL_SEC:-15}
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - asculticor-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3", "-u", "${MQTT_USERNAME:?MQTT_USERNAME is required}", "-P", "${MQTT_PASSWORD:?MQTT_PASSWORD is required}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # NGINX Secure Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: asculticor-nginx
    ports:
      - "${NGINX_HTTP_BIND_ADDRESS:-0.0.0.0}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_BIND_ADDRESS:-0.0.0.0}:${NGINX_HTTPS_PORT:-443}:443"
    environment:
      - DOLLAR=$
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-localhost}
      - NGINX_SSL_CERT_PATH=${NGINX_SSL_CERT_PATH:-/etc/nginx/certs/selfsigned.crt}
      - NGINX_SSL_KEY_PATH=${NGINX_SSL_KEY_PATH:-/etc/nginx/certs/selfsigned.key}
    networks:
      - asculticor-network
    depends_on:
      mosquitto:
        condition: service_healthy
      frontend:
        condition: service_started
      inference:
        condition: service_started
    restart: unless-stopped

  # Inference/Ingress Service (Python FastAPI)
  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: asculticor-inference
    ports:
      - "${INFERENCE_BIND_ADDRESS:-127.0.0.1}:${INFERENCE_PORT:-8000}:8000"
    environment:
      # Supabase
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}

      # MQTT
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:?MQTT_USERNAME is required}
      - MQTT_PASSWORD=${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      - MQTT_KEEPALIVE=60

      # ML Settings
      - PCG_SAMPLE_RATE=${PCG_SAMPLE_RATE:-22050}
      - PCG_TARGET_DURATION=${PCG_TARGET_DURATION:-10}
      - PCG_MAX_DURATION=${PCG_MAX_DURATION:-20}
      - ECG_SAMPLE_RATE=${ECG_SAMPLE_RATE:-500}
      - ECG_WINDOW_SIZE=${ECG_WINDOW_SIZE:-500}
      - ECG_MAX_WINDOWS=${ECG_MAX_WINDOWS:-12}
      - ECG_MAX_DURATION=${ECG_MAX_DURATION:-60}

      # Processing
      - STREAM_TIMEOUT_SEC=${STREAM_TIMEOUT_SEC:-20}
      - METRICS_UPDATE_HZ=${METRICS_UPDATE_HZ:-10}
      - PREPROCESSING_VERSION=v1.0.0

      # Demo Mode
      - ENABLE_DEMO_MODE=${ENABLE_DEMO_MODE:-false}

      # Logging / security
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - SECURITY_HEADERS_ENABLED=${SECURITY_HEADERS_ENABLED:-true}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-*.asculticor.com,localhost,127.0.0.1}
      - INFERENCE_INTERNAL_TOKEN=${INFERENCE_INTERNAL_TOKEN:?INFERENCE_INTERNAL_TOKEN is required}
      - MODELS_DIR=/app/models
    volumes:
      - ./models:/app/models:ro
      - inference_cache:/app/cache
    networks:
      - asculticor-network
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
    container_name: asculticor-frontend
    ports:
      - "${FRONTEND_BIND_ADDRESS:-0.0.0.0}:${FRONTEND_PORT:-3000}:3000"
    environment:
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN is required}
      - LLM_PROVIDER=${LLM_PROVIDER:-demo}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_BASE_URL=${CLAUDE_BASE_URL:-https://agentrouter.org}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250514}
      - MQTT_USERNAME=${MQTT_USERNAME:?MQTT_USERNAME is required}
      - MQTT_PASSWORD=${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      - MQTT_DEVICE_PASSWORD_PEPPER=${MQTT_DEVICE_PASSWORD_PEPPER:-}
      - MQTT_BIND_ADDRESS=${MQTT_BIND_ADDRESS:-127.0.0.1}
      - DEVICE_BOOTSTRAP_PUBLIC_BASE_URL=${DEVICE_BOOTSTRAP_PUBLIC_BASE_URL:-}
      - DEVICE_BOOTSTRAP_MQTT_HOST=${DEVICE_BOOTSTRAP_MQTT_HOST:-}
      - DEVICE_BOOTSTRAP_MQTT_PORT=${DEVICE_BOOTSTRAP_MQTT_PORT:-1883}
      - DEVICE_BOOTSTRAP_MQTT_TLS=${DEVICE_BOOTSTRAP_MQTT_TLS:-false}
      - DEVICE_DEFAULT_SESSION_DURATION_SEC=${DEVICE_DEFAULT_SESSION_DURATION_SEC:-15}
      - NODE_ENV=production
    networks:
      - asculticor-network
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  asculticor-network:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_logs:
  inference_cache:
