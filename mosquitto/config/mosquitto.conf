# Mosquitto MQTT Broker Configuration
# AscultiCor Local Development

# Listeners
listener 1883
protocol mqtt

listener 9001
protocol websockets

# Authentication — each device should have its own MQTT credentials
# The entrypoint.sh creates a shared user; for production, generate
# per-device users via mosquitto_passwd -b /mosquitto/config/passwd <user> <pass>
allow_anonymous false
password_file /mosquitto/config/passwd

# Access Control — restrict devices to their own topic namespace
acl_file /mosquitto/config/acl

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Connection limits
max_connections -1
max_queued_messages 1000

# Max packet size (10MB for binary chunks)
max_packet_size 10485760

# Quality of Service
max_qos 2